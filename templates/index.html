<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Chatbot AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="chat-card">
        <div class="top">
            <h1>🎓 NextGen Edubot API</h1>
            <p>Ask anything and get summarized answers instantly</p>

            <div class="action-buttons">
                <button onclick="newChat()">🆕 New Chat</button>
                <button onclick="clearChat()">🗑️ Clear Chat</button>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="bot-message">
                Hello 👋 Ask me any educational or general question.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask your question...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
